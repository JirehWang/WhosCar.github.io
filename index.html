<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>車主搜尋 - 穩定版</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
    .btn { background: #2196F3; color: white; padding: 15px 30px; border-radius: 5px; cursor: pointer; display: inline-block; font-size: 18px; }
    #status { margin: 15px; color: #666; font-weight: bold; }
    #result { margin-top: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; text-align: left; }
    /* 隱藏除錯用的畫布 */
    #processedCanvas { display: none; max-width: 100%; border: 1px solid #000; }
  </style>
</head>
<body>
  <h2>車主聯絡資料查詢</h2>
  
  <label for="cam" class="btn">📷 拍照/上傳辨識</label>
  <input type="file" id="cam" accept="image/*" capture="environment" style="display: none;" onchange="processImage(this)">
  
  <div id="status">系統就緒</div>
  <canvas id="processedCanvas"></canvas> <div id="result"></div>

  <script>
    const API_URL = "你的_GAS_URL";

    async function processImage(input) {
      const file = input.files[0];
      if (!file) return;

      const status = document.getElementById("status");
      status.innerText = "⏳ 影像強化中...";

      const img = new Image();
      img.onload = async () => {
        const canvas = document.getElementById("processedCanvas");
        const ctx = canvas.getContext("2d");

        // 1. 影像預處理：縮小並轉為「極致黑白」
        const scale = 800 / img.width;
        canvas.width = 800;
        canvas.height = img.height * scale;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
          // 關鍵二值化門檻：低於 128 變純黑，高於變純白
          const v = brightness < 128 ? 0 : 255; 
          data[i] = data[i+1] = data[i+2] = v;
        }
        ctx.putImageData(imageData, 0, 0);

        // 2. 開始辨識
        status.innerText = "🔍 辨識文字中...";
        const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-'
        });

        // 3. 提取車牌號碼
        const match = text.toUpperCase().match(/[A-Z0-9]{2,4}-?[A-Z0-9]{2,4}/);
        if (match) {
          const plate = match[0].replace("-", "");
          status.innerText = "✅ 辨識到車牌：" + match[0];
          fetchData(plate);
        } else {
          status.innerText = "❌ 無法清楚辨識，請確保對焦並重拍。";
        }
      };
      img.src = URL.createObjectURL(file);
    }

    function fetchData(plate) {
      fetch(`${API_URL}?action=getSearchResult&query=${plate}`)
        .then(res => res.json())
        .then(data => {
          const resDiv = document.getElementById("result");
          resDiv.style.display = "block";
          if (data.length > 0) {
            resDiv.innerHTML = `<b>車主：</b>${data[0][1]}<br><b>車號：</b>${data[0][0]}<br><b>電話：</b><a href="tel:${data[0][2]}">${data[0][2]}</a>`;
          } else {
            resDiv.innerHTML = "資料庫中查無此車號。";
          }
        });
    }
  </script>
</body>
</html>
