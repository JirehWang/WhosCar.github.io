<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>車主搜尋系統 - 專業整合版</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f0f2f5; color: #333; }
    
    /* 鏡頭區域 */
    .video-container { position: relative; width: 100vw; height: 50vh; background: #000; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    .scanner-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80%; height: 120px; border: 3px solid #ff4081; border-radius: 8px;
      box-shadow: 0 0 0 1000px rgba(0,0,0,0.4); z-index: 5; pointer-events: none;
    }
    
    /* 操作面板 */
    .panel { padding: 15px; background: #fff; border-radius: 20px 20px 0 0; margin-top: -20px; position: relative; z-index: 10; min-height: 50vh; }
    .btn-ocr { width: 100%; background: #ff4081; color: white; border: none; padding: 12px; border-radius: 50px; font-size: 18px; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
    
    /* 搜尋表單 */
    .search-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .btn-search { background: #2196F3; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; }

    /* 結果顯示區 */
    #status { font-size: 14px; color: #666; text-align: center; margin-bottom: 10px; }
    #resultBox { display: none; background: #e3f2fd; padding: 15px; border-radius: 12px; border-left: 5px solid #2196F3; }
    .info-row { margin-bottom: 8px; font-size: 16px; }
    .info-label { font-weight: bold; color: #1565c0; width: 60px; display: inline-block; }
    
    canvas { display: none; } /* 隱藏處理畫布 */
  </style>
</head>
<body>

  <div class="video-container">
    <video id="video" autoplay playsinline></video>
    <div class="scanner-overlay"></div>
  </div>

  <div class="panel">
    <button class="btn-ocr" onclick="captureAndOCR()">🔍 掃描紅框內車牌</button>
    
    <div id="status">鏡頭啟動中...</div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <form class="search-group" onsubmit="manualSearch(event)">
      <input type="text" id="inputData" placeholder="或是手動輸入車號" autocomplete="off">
      <button type="submit" class="btn-search">搜尋</button>
    </form>

    <div id="resultBox">
      <div class="info-row"><span class="info-label">車主：</span><span id="resOwner">-</span></div>
      <div class="info-row"><span class="info-label">車號：</span><span id="resPlate">-</span></div>
      <div class="info-row"><span class="info-label">電話：</span><a id="resTel" href="#">-</a></div>
      <button onclick="hideResult()" style="margin-top:10px; background:none; border:none; color:#666; font-size:12px; cursor:pointer;">[清除結果]</button>
    </div>
  </div>

  <canvas id="cropCanvas"></canvas>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxOkoaNquIx_V8n_7eS_5ULmoqxPVly_Bezx9_QsmWSzNOcojrCI9Oa6UNd5hOD2euS/exec"; // <--- 務必換成你的
    const video = document.getElementById('video');
    const canvas = document.getElementById('cropCanvas');
    const status = document.getElementById('status');

    // 1. 鏡頭初始化
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment" },
          audio: false 
        });
        video.srcObject = stream;
        status.innerText = "✅ 鏡頭就緒";
      } catch (err) {
        status.innerText = "❌ 鏡頭開啟失敗，請檢查權限";
      }
    }

    // 2. 裁切與辨識邏輯
    async function captureAndOCR() {
      status.innerText = "⏳ 影像強化與辨識中...";
      hideResult();

      const ctx = canvas.getContext('2d');
      const vW = video.videoWidth;
      const vH = video.videoHeight;
      
      // 根據比例計算裁切位置 (對應 80% 寬, 120px 高)
      const cropW = vW * 0.8;
      const cropH = vW * 0.3; // 假設比例
      const startX = (vW - cropW) / 2;
      const startY = (vH - cropH) / 2;

      canvas.width = cropW;
      canvas.height = cropH;
      ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, cropW, cropH);

      // 二值化預處理
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const avg = (d[i] + d[i+1] + d[i+2]) / 3;
        const v = avg < 125 ? 0 : 255;
        d[i] = d[i+1] = d[i+2] = v;
      }
      ctx.putImageData(imgData, 0, 0);

      try {
        const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-'
        });
        const match = text.toUpperCase().match(/[A-Z0-9]{2,4}-?[A-Z0-9]{2,4}/);
        if (match) {
          const plate = match[0].replace("-", "");
          document.getElementById('inputData').value = match[0];
          status.innerText = "✅ 辨識到：" + match[0];
          fetchData(plate);
        } else {
          status.innerText = "❓ 辨識不清楚，請靠近點再試一次";
        }
      } catch (e) {
        status.innerText = "❌ 辨識出錯";
      }
    }

    // 3. 手動搜尋邏輯
    function manualSearch(e) {
      e.preventDefault();
      const val = document.getElementById('inputData').value.toUpperCase().replace("-", "");
      if (!val) return;
      status.innerText = "🔍 正在搜尋資料庫...";
      fetchData(val);
    }

    // 4. GAS 資料串接
    function fetchData(plate) {
      fetch(`${API_URL}?action=getSearchResult&query=${plate}`)
        .then(res => res.json())
        .then(data => {
          if (data && data.length > 0) {
            showResult(data[0]);
            status.innerText = "✅ 查詢完畢";
          } else {
            status.innerText = "⚠️ 資料庫查無此車號";
            hideResult();
          }
        })
        .catch(err => {
          status.innerText = "❌ 伺服器連線失敗";
        });
    }

    function showResult(item) {
      document.getElementById('resOwner').innerText = item[1];
      document.getElementById('resPlate').innerText = item[0];
      document.getElementById('resTel').innerText = item[2];
      document.getElementById('resTel').href = "tel:" + item[2];
      document.getElementById('resultBox').style.display = "block";
    }

    function hideResult() {
      document.getElementById('resultBox').style.display = "none";
    }

    window.onload = initCamera;
  </script>
</body>
</html>
