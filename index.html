<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>車主搜尋 - 專業掃描版</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
    
    /* 鏡頭容器 */
    .video-container { position: relative; width: 100vw; height: 70vh; background: #222; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    
    /* 掃描框區域 */
    .scanner-overlay {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 70%; height: 150px;
      border: 3px solid #ff4081; border-radius: 10px;
      box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); /* 遮罩效果 */
      z-index: 10;
    }
    .scanner-tip {
      position: absolute; bottom: -30px; width: 100%; text-align: center;
      color: #ff4081; font-weight: bold; font-size: 14px;
    }

    /* 控制面板 */
    .controls { height: 30vh; background: #fff; color: #333; padding: 20px; box-sizing: border-box; }
    .btn-capture {
      width: 100%; background: #2196F3; color: white; border: none;
      padding: 15px; border-radius: 50px; font-size: 18px; cursor: pointer;
    }
    #status { margin-top: 10px; font-size: 14px; color: #666; text-align: center; }
    
    /* 結果呈現 */
    #resultBox { 
      margin-top: 15px; padding: 10px; border: 1px dashed #ccc; border-radius: 5px; 
      display: none; background: #f9f9f9; 
    }
    canvas { display: none; } /* 用於裁切影像的隱藏畫布 */
  </style>
</head>
<body>

  <div class="video-container">
    <video id="video" autoplay playsinline></video>
    <div class="scanner-overlay">
      <div class="scanner-tip">請將車牌對準框內</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-capture" onclick="captureAndOCR()">🔍 立即辨識車牌</button>
    <div id="status">正在開啟鏡頭...</div>
    
    <div id="resultBox"></div>
  </div>

  <canvas id="cropCanvas"></canvas>

  <script>
    const API_URL = "你的_GAS_URL";
    const video = document.getElementById('video');
    const canvas = document.getElementById('cropCanvas');
    const status = document.getElementById('status');

    // 1. 初始化鏡頭
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment" }, // 使用後置鏡頭
          audio: false 
        });
        video.srcObject = stream;
        status.innerText = "✅ 鏡頭就緒";
      } catch (err) {
        status.innerText = "❌ 無法開啟鏡頭，請確認權限";
        console.error(err);
      }
    }

    // 2. 裁切影像並辨識
    async function captureAndOCR() {
      status.innerText = "⏳ 正在處理影像...";
      
      const ctx = canvas.getContext('2d');
      
      // 設定裁切範圍 (對應 CSS 的 70% 寬, 150px 高)
      const videoW = video.videoWidth;
      const videoH = video.videoHeight;
      
      // 計算相對於影片原始解析度的紅框座標
      const cropW = videoW * 0.7;
      const cropH = 150 * (videoW / window.innerWidth); // 等比例換算高度
      const startX = (videoW - cropW) / 2;
      const startY = (videoH - cropH) / 2;

      canvas.width = cropW;
      canvas.height = cropH;

      // 擷取紅框內的影像
      ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, cropW, cropH);

      // --- 影像預處理：轉為極致黑白 ---
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const avg = (data[i] + data[i+1] + data[i+2]) / 3;
        const v = avg < 120 ? 0 : 255; // 強化黑白對比
        data[i] = data[i+1] = data[i+2] = v;
      }
      ctx.putImageData(imageData, 0, 0);

      // 執行辨識
      status.innerText = "🔍 正在精準辨識車牌文字...";
      try {
        const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-'
        });

        const match = text.toUpperCase().match(/[A-Z0-9]{2,4}-?[A-Z0-9]{2,4}/);
        if (match) {
          const plate = match[0].replace("-", "");
          status.innerText = "✅ 成功辨識: " + match[0];
          fetchOwnerData(plate);
        } else {
          status.innerText = "❌ 辨識模糊，請確保光線並靠近車牌。";
        }
      } catch (e) {
        status.innerText = "❌ 辨識出錯";
      }
    }

    // 3. 從 GAS 獲取資料
    function fetchOwnerData(plate) {
      fetch(`${API_URL}?action=getSearchResult&query=${plate}`)
        .then(res => res.json())
        .then(data => {
          const resBox = document.getElementById('resultBox');
          resBox.style.display = "block";
          if (data.length > 0) {
            resBox.innerHTML = `<b>車主：</b>${data[0][1]} <br> <b>車號：</b>${data[0][0]} <br> <b>電話：</b><a href="tel:${data[0][2]}">${data[0][2]}</a>`;
          } else {
            resBox.innerHTML = "資料庫中查無此車牌。";
          }
        });
    }

    window.onload = initCamera;
  </script>
</body>
</html>
