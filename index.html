<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>極速車牌搜尋</title>
  <script src="https://cdn.jsdelivr.net/npm/@paddlejs/paddlejs-core@1.1.0/dist/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@paddlejs/paddlejs-backend-webgl@1.1.0/dist/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@paddlejs/paddlejs-ocr@1.1.0/dist/index.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f0f2f5; text-align: center; }
    .header { background: #3f51b5; color: white; padding: 15px; font-size: 20px; font-weight: bold; }
    .main-box { padding: 20px; }
    .ocr-trigger { 
      background: #ff4081; color: white; padding: 15px 30px; 
      border-radius: 50px; font-size: 18px; cursor: pointer;
      display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    #status { margin-top: 10px; color: #666; font-size: 14px; }
    #resultArea { 
      margin: 20px; background: white; border-radius: 10px; 
      padding: 15px; display: none; text-align: left;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .loading-dot { display: inline-block; width: 8px; height: 8px; background: #3f51b5; border-radius: 50%; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="header">巡邏車主查找系統 (v3-Light)</div>
  
  <div class="main-box">
    <label for="camInput" class="ocr-trigger">📷 拍車牌</label>
    <input type="file" id="camInput" accept="image/*" capture="environment" style="display: none;" onchange="doLightOCR(this)">
    <div id="status">系統初始化中...</div>
  </div>

  <div id="resultArea"></div>

  <script>
    const API_URL = "你的_GAS_URL";
    let ocr = null;

    // 初始化：載入輕量化模型
    async function init() {
      const status = document.getElementById("status");
      try {
        ocr = new PaddleOCR(); // 預設載入 mobile 輕量版
        await ocr.init();
        status.innerText = "✅ 系統就緒 (已載入輕量模型)";
      } catch (e) {
        status.innerText = "❌ 初始化失敗，請重整";
      }
    }

    async function doLightOCR(input) {
      if (!ocr || !input.files[0]) return;
      
      const status = document.getElementById("status");
      const resArea = document.getElementById("resultArea");
      status.innerHTML = "⚡ 正在辨識 <span class='loading-dot'></span>";
      resArea.style.display = "none";

      const file = input.files[0];
      const img = new Image();
      img.onload = async () => {
        // --- 預處理：稍微縮小圖片提升手機運算速度 ---
        const canvas = document.createElement('canvas');
        const maxSide = 800; // 限制最大邊長
        let w = img.width, h = img.height;
        if (w > h && w > maxSide) { h = (maxSide/w)*h; w = maxSide; }
        else if (h > maxSide) { w = (maxSide/h)*w; h = maxSide; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);

        const result = await ocr.recognize(canvas);
        
        if (result && result.length > 0) {
          // 串接所有辨識到的字塊
          const fullText = result.map(r => r.text).join("").toUpperCase();
          // 改進的正則：支持更廣泛的車牌格式 (含橫槓或純數字)
          const match = fullText.match(/[A-Z0-9]{2,4}-?[A-Z0-9]{2,4}/);
          
          if (match) {
            const plate = match[0].replace("-", "");
            status.innerText = "✅ 辨識到：" + match[0];
            searchGAS(plate);
          } else {
            status.innerText = "❓ 辨識到文字但不像車牌：" + fullText;
          }
        } else {
          status.innerText = "❌ 沒辨識到文字，請拍清楚一點。";
        }
      };
      img.src = URL.createObjectURL(file);
    }

    function searchGAS(plate) {
      fetch(`${API_URL}?action=getSearchResult&query=${plate}`)
        .then(r => r.json())
        .then(data => {
          const resArea = document.getElementById("resultArea");
          resArea.style.display = "block";
          if (data.length > 0) {
            resArea.innerHTML = `<b>車主：</b>${data[0][1]}<br><b>車號：</b>${data[0][0]}<br><b>電話：</b><a href="tel:${data[0][2]}">${data[0][2]}</a>`;
          } else {
            resArea.innerHTML = "查無資料";
          }
        });
    }

    init();
  </script>
</body>
</html>
